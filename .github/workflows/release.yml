name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            archive: narou-linux-x64
          - target: bun-linux-arm64
            archive: narou-linux-arm64
          - target: bun-darwin-x64
            archive: narou-darwin-x64
          - target: bun-darwin-arm64
            archive: narou-darwin-arm64
          - target: bun-windows-x64
            archive: narou-windows-x64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aaae5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - run: bun install --frozen-lockfile

      - name: Build (Unix)
        if: ${{ !startsWith(matrix.target, 'bun-windows') }}
        run: bun build --compile --minify --sourcemap --target=${{ matrix.target }} ./index.ts --outfile narou

      - name: Build (Windows)
        if: ${{ startsWith(matrix.target, 'bun-windows') }}
        run: bun build --compile --minify --sourcemap --target=${{ matrix.target }} ./index.ts --outfile narou.exe

      - name: Compress (gzip)
        if: ${{ !startsWith(matrix.target, 'bun-windows') }}
        run: gzip -c narou > ${{ matrix.archive }}.gz

      - name: Compress (zip)
        if: ${{ startsWith(matrix.target, 'bun-windows') }}
        run: zip -j ${{ matrix.archive }}.zip narou.exe

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ matrix.archive }}.*

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - run: zip -r skills.zip skills

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: skills.zip